name: 🐛 Bug Report
description: Report a problem with the app
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the
        sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: App version
      description: Visible in Settings → About, or in the GitHub release notes.
      placeholder: "1.4.0+10"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android (Google Play)
        - Android (sideload APK)
        - Android (Huawei AppGallery)
        - Android (F-Droid)
        - iOS (App Store)
        - Web (PWA)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device + OS version
      placeholder: "Samsung Galaxy A52 — Android 14"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Open the app
        2. Tap hadith #5
        3. Tap the audio play button
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include screenshots if helpful. Drag-and-drop into this field.
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I confirm that nothing in this report contains personal information I want kept private.
          required: true
