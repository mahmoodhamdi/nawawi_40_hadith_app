# GitHub Sponsors / similar funding indicators.
#
# The project explicitly does NOT solicit donations to fund the app
# itself (it's offered as sadaqah jariyah — free, forever). This file
# only exists to make clear there is no funding channel, so well-meaning
# users don't try to find one elsewhere.
#
# If a future maintainer decides to accept donations to cover hosting
# / audio re-recording costs / translation review fees, uncomment one
# of the lines below and update DAWAH_PLAN.md to explain the use.

# github: [your-username]
# patreon: your-username
# open_collective: your-collective
# ko_fi: your-username
# custom: ["https://example.com/donate"]
