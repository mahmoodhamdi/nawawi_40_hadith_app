AutoName: Forty Hadith Nawawi

Description: |-
    A free Islamic app presenting the 42 Hadiths compiled by Imam an-Nawawi,
    with audio recitation by Sheikh Ahmad Al-Nafees and a simple explanation
    for each hadith. Fully offline, no advertising, no tracking, no analytics.

    Features:

    * 42 hadiths with verified citations (narrator, source, sunnah.com link)
    * Audio recitation by Sheikh Ahmad Al-Nafees for every hadith
    * Simple explanation of each hadith
    * Smart search by text or hadith number
    * Favorites and reading progress
    * Four themes (Light, Dark, Blue, Purple)
    * Arabic and English with full RTL support
    * Daily hadith reminder
    * Focused reading mode
    * Share hadith as a beautiful image

    The app is offered as a continuing charity (sadaqah jariyah) for every
    Muslim. It works 100% offline. No data is collected or transmitted.

